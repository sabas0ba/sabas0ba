name: Build repository index

# Regenerates the README index section and docs/index.html from the public
# repositories of the account that own this repository.
#
# Triggers:
#   - push to main (immediate refresh on profile edits)
#   - weekly schedule (Monday 00:00 UTC) to pick up changes in other repos
#   - manual dispatch
#
# Actions are pinned to full commit SHAs (supply-chain hardening). The trailing
# comment records the human-readable version each SHA corresponds to.

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-index
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false  # test job never pushes
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14.6"
      - name: Run unit tests
        working-directory: scripts
        run: python -m unittest discover -t . -s . -p 'test_*.py' -v

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14.6"
      - name: Generate index
        env:
          GITHUB_TOKEN: ${{ github.token }}
          OWNER: ${{ github.repository_owner }}
        run: >-
          python scripts/build_index.py "$OWNER"
          --tagline "mochimochi engineer. here are my hobby works:"
      - name: Commit changes if any
        run: |
          if [ -n "$(git status --porcelain README.md docs/index.html)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md docs/index.html
            git commit -m "chore: regenerate repository index"
            git push
          else
            echo "No changes to commit."
          fi
